name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint all workspaces
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web
        run: pnpm build:web

      - name: Build admin
        run: pnpm build:admin

      - name: Check mobile
        run: pnpm check:mobile

      - name: Expo dependency check
        run: pnpm check:expo
